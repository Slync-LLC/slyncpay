services:
  - type: web
    name: slyncpay-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install -g pnpm@9.0.0 && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @slyncpay/types build && pnpm --filter @slyncpay/wingspan build && pnpm --filter @slyncpay/db build && pnpm --filter @slyncpay/api build && NODE_ENV=development DATABASE_URL=$DATABASE_URL pnpm --filter @slyncpay/db db:migrate
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: slyncpay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: slyncpay-redis
          property: connectionString
      - key: WINGSPAN_ROOT_API_TOKEN
        sync: false
      - key: WINGSPAN_ROOT_USER_ID
        sync: false
      - key: WINGSPAN_BASE_URL
        value: https://api.wingspan.app
      - key: EIN_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://slyncpay-web.onrender.com

  - type: web
    name: slyncpay-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install -g pnpm@9.0.0 && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @slyncpay/types build && pnpm --filter @slyncpay/web build && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && cp -r apps/web/public apps/web/.next/standalone/apps/web/public
    startCommand: node apps/web/.next/standalone/apps/web/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_URL
        value: https://slyncpay-api.onrender.com
      - key: JWT_SECRET
        fromService:
          type: web
          name: slyncpay-api
          envVarKey: JWT_SECRET
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

  - type: redis
    name: slyncpay-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: slyncpay-db
    databaseName: slyncpay
    region: oregon
    plan: starter
    postgresMajorVersion: 16
